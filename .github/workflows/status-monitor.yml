name: WhatsApp Business API Status Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  repository_dispatch:
    types: [cron-job]
  workflow_dispatch:

jobs:
  check-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Run status check
        run: python status_check.py

      - name: Commit state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add state.json
          git diff --cached --quiet || (git commit -m "Update state" && git push)