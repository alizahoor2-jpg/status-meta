name: WhatsApp Business API Status Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  repository_dispatch:
    types: [cron-job]
  workflow_dispatch:

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Run status check
        run: python status_check.py